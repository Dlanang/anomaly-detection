# =============================================================================
# docker-compose.yml – Foxy Anomaly Detection
# Docker Compose v2 modern format (tanpa field 'version' yang deprecated)
#
# Arsitektur (single container):
#   NPM Plus (443/HTTPS) → Streamlit (127.0.0.1:8501)
#
# Internal nginx TIDAK diperlukan karena NPM Plus sudah menangani:
#   - SSL termination
#   - WebSocket upgrade (via toggle Websockets Support)
#   - Reverse proxy & header forwarding
# =============================================================================

services:

  # ─────────────────────────────────────────────────────────────────────────
  # Satu-satunya container: Streamlit Application
  # ─────────────────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - python:3.11-slim
    image: foxy-anomaly-detection:latest
    container_name: foxy-app
    restart: unless-stopped

    # Bind HANYA ke loopback interface (127.0.0.1)
    # → Port 8501 TIDAK terbuka ke internet/publik
    # → Hanya NPM Plus (di VPS yang sama) yang bisa mengakses
    ports:
      - "127.0.0.1:8501:8501"

    # ── Environment variables ──────────────────────────────────────────────
    environment:
      STREAMLIT_SERVER_PORT: "8501"
      STREAMLIT_SERVER_ADDRESS: "0.0.0.0"
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
      STREAMLIT_SERVER_ENABLE_CORS: "false"
      STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION: "false"
      STREAMLIT_SERVER_MAX_UPLOAD_SIZE: "200"
      STREAMLIT_SERVER_MAX_MESSAGE_SIZE: "200"
      MPLBACKEND: "Agg"
      MPLCONFIGDIR: "/tmp/matplotlib"
      PYTHONUNBUFFERED: "1"

    # Uncomment untuk load secrets dari .env file (tidak di-commit ke git)
    # env_file:
    #   - .env

    # ── Health check ──────────────────────────────────────────────────────
#    healthcheck:
#      test:
#        - "CMD"
#       - "python"
#        - "-c"
#        - "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"
#      interval: 30s
#      timeout: 10s
#      start_period: 60s
#      retries: 3

    # ── Resource limits ───────────────────────────────────────────────────
#   deploy:
#     resources:
#        limits:
#          cpus: "1"
#          memory: "1536M"
#        reservations:
#          cpus: "0.25"
#          memory: "512M"

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
