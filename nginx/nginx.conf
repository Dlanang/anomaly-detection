# =============================================================================
# nginx.conf – Internal Reverse Proxy untuk Streamlit
# Image: nginx:1.27-alpine
#
# KEPUTUSAN ARSITEKTUR KRITIS:
# Streamlit menggunakan WebSocket di path /_stcore/stream untuk komunikasi
# real-time antara browser dan server. Tanpa upgrade header yang benar,
# halaman akan error atau tidak update secara live.
#
# Arsitektur flow:
#   NPM (HTTPS:443) → nginx:80 → Streamlit:8501
# =============================================================================

# Auto-detect jumlah CPU core untuk worker processes
worker_processes auto;

# Batas file descriptor per worker (penting untuk koneksi WebSocket yang banyak)
worker_rlimit_nofile 4096;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use                 epoll;      # Event model terbaik di Linux
    multi_accept        on;         # Terima semua koneksi pending sekaligus
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    'rt=$request_time ua="$upstream_addr"';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75s;
    types_hash_max_size 2048;

    # Sembunyikan versi nginx dari response header (security)
    server_tokens      off;

    # ── PENTING: Jangan aktifkan gzip ─────────────────────────────────────────
    # Gzip TIDAK kompatibel dengan:
    # 1. WebSocket frames (Streamlit /_stcore/stream)
    # 2. Server-Sent Events / streaming responses
    # Mengaktifkan gzip akan menyebabkan koneksi WebSocket gagal.
    gzip off;

    # ── WebSocket Connection Upgrade Map ──────────────────────────────────────
    # KRITIKAL untuk Streamlit!
    # Streamlit menggunakan WebSocket di /_stcore/stream untuk semua
    # komunikasi widget → server.
    #
    # Logic:
    #   - Jika request header "Upgrade: websocket" ada → set Connection: upgrade
    #   - Jika tidak ada (HTTP biasa) → set Connection: close
    map $http_upgrade $connection_upgrade {
        default  upgrade;
        ''       close;
    }

    # ── Upstream: Streamlit Application ──────────────────────────────────────
    # 'app' = nama service di docker-compose.yml (DNS internal Docker)
    # keepalive 32 = pertahankan hingga 32 koneksi persistent ke upstream
    upstream streamlit_backend {
        server app:8501;
        keepalive 32;
    }

    # ── Main Server Block ─────────────────────────────────────────────────────
    server {
        listen       80;
        server_name  _;   # Terima semua hostname

        # ── Security Headers ─────────────────────────────────────────────────
        # NPM akan menambahkan HSTS dan CSP untuk HTTPS — di sini kita set
        # header keamanan dasar untuk koneksi internal
        add_header X-Frame-Options         "SAMEORIGIN"    always;
        add_header X-Content-Type-Options  "nosniff"       always;
        add_header X-XSS-Protection        "1; mode=block" always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

        # ── Client Request Limits ─────────────────────────────────────────────
        # Harus sama atau lebih besar dari STREAMLIT_SERVER_MAX_UPLOAD_SIZE
        client_max_body_size    200M;
        client_body_timeout     120s;
        client_header_timeout   60s;

        # ── Main Proxy Location ───────────────────────────────────────────────
        # Semua request diteruskan ke Streamlit
        location / {
            proxy_pass         http://streamlit_backend;
            proxy_http_version 1.1;   # Wajib untuk WebSocket & keepalive

            # ── WebSocket Upgrade Headers (WAJIB untuk Streamlit) ─────────────
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # ── Forwarding Headers ────────────────────────────────────────────
            # Host            : hostname original (dibutuhkan Streamlit untuk CORS/XSRF)
            # X-Real-IP       : IP client asli
            # X-Forwarded-For : chain IP jika ada multiple proxy (NPM → nginx → app)
            # X-Forwarded-Proto: protocol yang digunakan client (https dari NPM)
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $http_x_forwarded_proto;

            # ── Timeout Settings ──────────────────────────────────────────────
            # WebSocket Streamlit bisa terbuka sangat lama (sepanjang user aktif)
            # Jangan gunakan nilai kecil — akan menyebabkan koneksi terputus tiba-tiba
            proxy_read_timeout    86400s;   # 24 jam — untuk WebSocket long-lived
            proxy_send_timeout    86400s;
            proxy_connect_timeout 10s;      # Koneksi ke upstream harus cepat

            # ── Buffer Settings ───────────────────────────────────────────────
            # proxy_buffering off: KRITIKAL untuk streaming/WebSocket
            # Dengan buffering ON, nginx akan menahan response sampai buffer penuh
            # → Streamlit real-time update akan ter-delay atau error
            proxy_buffering    off;
            proxy_buffer_size  4k;
            proxy_cache        off;
            proxy_redirect     off;

            # Hint ke nginx untuk tidak tutup koneksi upstream setelah response
            proxy_set_header   Connection "";  # Override untuk keepalive upstream
        }

        # ── Streamlit Health Check Endpoint ──────────────────────────────────
        # Endpoint khusus untuk health check — tidak perlu log verbose
        location /_stcore/health {
            proxy_pass         http://streamlit_backend/_stcore/health;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_read_timeout 5s;
            access_log         off;   # Jangan polusi log dengan health checks
        }

        # ── Nginx Self Health Check ───────────────────────────────────────────
        # Endpoint untuk health check nginx itu sendiri (digunakan docker-compose)
        # Juga bisa digunakan NPM untuk monitoring
        location /nginx-health {
            access_log  off;
            return      200 "OK\n";
            add_header  Content-Type text/plain;
        }

        # ── Static Assets Cache ───────────────────────────────────────────────
        # Streamlit melayani static assets sendiri, tapi kita bisa hint browser
        # untuk cache assets yang tidak berubah
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
            proxy_pass         http://streamlit_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_buffering    on;
            proxy_buffer_size  16k;
            proxy_buffers      4 32k;

            # Cache static files di browser selama 1 jam
            expires            1h;
            add_header         Cache-Control "public, immutable";
            access_log         off;
        }
    }
}
